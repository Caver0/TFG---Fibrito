services:
  mongodb:
    image: mongo:7
    container_name: fibrito-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    container_name: fibrito-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - mongodb

  frontend:
    image: node:20
    container_name: fibrito-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  mongodb_data:
